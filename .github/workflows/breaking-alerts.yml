name: Breaking Alerts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/breaking-alerts.yml"
      - "aibrief/breaking_monitor.py"
  schedule:
    # Repository visibility checked with: gh repo view f2h2dai/AibriefAI --json visibility,nameWithOwner
    # PUBLIC repository: start at every 15 minutes. GitHub schedule execution is near-real-time and may be delayed.
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: aibrief-breaking-alerts
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: gemini-2.0-flash
  TWITTER_COOKIE: ${{ secrets.TWITTER_COOKIE }}
  BREAKING_NOTIFY_MODE: "website"
  BREAKING_SOURCE_FOCUS: "x"
  BREAKING_X_QUERY: '"Grok Gov" OR "Grok Gov Model" OR "Project Maven" OR Pentagon OR "Operation Epic Fury" OR Iran OR munitions OR targeting'
  X_INFLUENCERS: ${{ vars.X_INFLUENCERS }}
  BREAKING_MAX_LLM_REQUESTS_PER_RUN: "1"
  BREAKING_MAX_CANDIDATES_PER_BATCH: "20"
  BREAKING_MIN_CONFIDENCE: "0.90"
  BREAKING_CADENCE_MINUTES: "15"

jobs:
  breaking-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install X route
        shell: bash
        run: |
          set +e
          export PATH="$HOME/.local/bin:$PATH"
          if command -v pipx >/dev/null 2>&1; then
            pipx install twitter-cli || python3 -m pip install twitter-cli || echo "twitter-cli install unavailable; X route will degrade"
          else
            python3 -m pip install twitter-cli || echo "twitter-cli install unavailable; X route will degrade"
          fi
          which twitter || echo "twitter CLI unavailable after install attempt"
          set -e

      - name: Validate Gemini key
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::warning::GEMINI_API_KEY missing; breaking candidates will stay under review."
          else
            echo "GEMINI_API_KEY loaded for breaking classifier."
          fi

      - name: Run breaking monitor
        shell: bash
        run: |
          set -euo pipefail
          python3 -m aibrief.breaking_monitor

      - name: Commit breaking state
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- data/breaking_state.json web/data/breaking_status.json; then
            echo "No breaking state changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/breaking_state.json web/data/breaking_status.json
          git commit -m "Update breaking alert state [skip ci]"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
