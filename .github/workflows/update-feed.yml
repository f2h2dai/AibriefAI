name: Update Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: aibrief-feed
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ENVIRONMENT: production
  LOG_LEVEL: INFO
  PIPELINE_INTERVAL_MINUTES: "5"
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  GEMINI_MODEL: gemini-2.5-flash
  GROQ_MODEL: llama-3.3-70b-versatile
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  AIBRIEF_LLM_ENABLED: "true"

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Show project files
        run: |
          pwd
          ls -la
          test -f pyproject.toml
          test -d aibrief
          test -d scripts
          test -d web

      - name: Install package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Compile
        run: |
          python -m compileall -q aibrief scripts cli

      - name: Run tests
        env:
          AIBRIEF_LLM_ENABLED: "false"
        run: |
          python -m pytest -q

      - name: Run Aibrief pipeline
        run: |
          python scripts/run_pipeline.py --topic "AI agents" --limit 8 --emit-html

      - name: Verify generated files
        run: |
          test -s data/latest_report.json
          test -s web/data/signals.json
          test -s web/brief.html
          test -s web/health.json
          test -s web/health/index.html

      - name: Commit updated feed
        run: |
          git config user.name "aibrief-bot"
          git config user.email "aibrief-bot@example.com"
          git add data/latest_report.json web/data/signals.json web/brief.html web/health.json web/health/index.html data/usage || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update Aibrief feed [skip ci]"
          git push
