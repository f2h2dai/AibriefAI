name: Update Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: aibrief-feed
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: gemini-2.5-flash
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  GROQ_MODEL: llama-3.3-70b-versatile

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate AibriefAI feed
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p web/data web/health data

          python3 - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          from html import escape
          from pathlib import Path

          NOW = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          TOPIC = "AI agents"

          GEMINI_API_KEY = os.getenv("GEMINI_API_KEY", "").strip()
          GEMINI_MODEL = os.getenv("GEMINI_MODEL", "gemini-2.5-flash").strip()
          GROQ_API_KEY = os.getenv("GROQ_API_KEY", "").strip()
          GROQ_MODEL = os.getenv("GROQ_MODEL", "llama-3.3-70b-versatile").strip()

          GEMINI_QUOTA_EXHAUSTED = False
          PROVIDER_COUNTS = {
              "gemini": 0,
              "groq": 0,
              "rule-based": 0
          }

          def fetch_json(url, timeout=12):
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "AibriefAI/1.0",
                      "Accept": "application/json",
                  },
              )
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return json.loads(r.read().decode("utf-8", "replace"))

          def fetch_text(url, timeout=12):
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "AibriefAI/1.0",
                      "Accept": "application/xml,text/xml,text/plain",
                  },
              )
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return r.read(2_000_000).decode("utf-8", "replace")

          def score_text(title, content, source):
              text = f"{title} {content}".lower()
              weights = {
                  "agent": 14,
                  "agents": 14,
                  "ai": 10,
                  "llm": 10,
                  "gemini": 12,
                  "groq": 10,
                  "rag": 9,
                  "workflow": 8,
                  "automation": 8,
                  "open source": 8,
                  "github": 7,
                  "research": 7,
              }

              score = {
                  "hackernews": 25,
                  "github": 22,
                  "arxiv": 30,
                  "reddit": 18,
                  "fallback": 20,
              }.get(source, 15)

              for term, weight in weights.items():
                  if re.search(rf"\b{re.escape(term)}\b", text):
                      score += weight

              return max(0, min(100, score))

          def topic_for(title, content):
              text = f"{title} {content}".lower()

              if "agent" in text:
                  return "AI Agents"
              if "rag" in text or "retrieval" in text:
                  return "RAG"
              if "model" in text or "llm" in text:
                  return "LLMs"
              if "github" in text or "open source" in text:
                  return "Open Source"

              return "AI"

          def summarize_rule(title, content):
              c = re.sub(r"\s+", " ", content or "").strip()

              if not c:
                  return f"{title} is relevant to AI operators tracking technical signals."

              return c[:220] + ("..." if len(c) > 220 else "")

          def parse_llm_json(text, rule_summary):
              text = text.strip()
              text = text.removeprefix("```json").removeprefix("```").removesuffix("```").strip()
              parsed = json.loads(text)

              return (
                  parsed.get("en") or rule_summary,
                  parsed.get("ar") or "No Arabic brief returned."
              )

          def llm_brief(title, content):
              global GEMINI_QUOTA_EXHAUSTED
              global PROVIDER_COUNTS

              rule_summary = summarize_rule(title, content)

              prompt = (
                  "Create a concise bilingual AI intelligence brief.\n"
                  "Return JSON only with keys: en, ar.\n"
                  "Style: factual, concise, OSINT-oriented, professional Arabic.\n"
                  f"Title: {title}\n"
                  f"Content: {content[:1500]}\n"
              )

              if GEMINI_API_KEY and not GEMINI_QUOTA_EXHAUSTED:
                  payload = json.dumps({
                      "contents": [{"parts": [{"text": prompt}]}],
                      "generationConfig": {
                          "temperature": 0.2,
                          "maxOutputTokens": 512
                      }
                  }).encode("utf-8")

                  url = (
                      "https://generativelanguage.googleapis.com/v1beta/models/"
                      + urllib.parse.quote(GEMINI_MODEL)
                      + ":generateContent?key="
                      + urllib.parse.quote(GEMINI_API_KEY)
                  )

                  try:
                      req = urllib.request.Request(
                          url,
                          data=payload,
                          method="POST",
                          headers={"Content-Type": "application/json"},
                      )

                      with urllib.request.urlopen(req, timeout=25) as r:
                          data = json.loads(r.read().decode("utf-8", "replace"))

                      text = data["candidates"][0]["content"]["parts"][0]["text"]
                      PROVIDER_COUNTS["gemini"] += 1
                      return parse_llm_json(text, rule_summary)

                  except urllib.error.HTTPError as e:
                      body = e.read().decode("utf-8", "replace")

                      if e.code == 429:
                          GEMINI_QUOTA_EXHAUSTED = True
                      else:
                          PROVIDER_COUNTS["rule-based"] += 1
                          return rule_summary, f"Gemini HTTP {e.code}: {body[:200]}"

                  except urllib.error.URLError as e:
                      PROVIDER_COUNTS["rule-based"] += 1
                      return rule_summary, f"Gemini URLError: {e.reason}"

                  except Exception as e:
                      PROVIDER_COUNTS["rule-based"] += 1
                      return rule_summary, f"Gemini {type(e).__name__}: {e}"

              if GROQ_API_KEY:
                  payload = json.dumps({
                      "model": GROQ_MODEL,
                      "messages": [
                          {
                              "role": "system",
                              "content": "Return JSON only with keys en and ar."
                          },
                          {
                              "role": "user",
                              "content": prompt
                          }
                      ],
                      "temperature": 0.2,
                      "max_tokens": 512
                  }).encode("utf-8")

                  try:
                      req = urllib.request.Request(
                          "https://api.groq.com/openai/v1/chat/completions",
                          data=payload,
                          method="POST",
                          headers={
                              "Content-Type": "application/json",
                              "Authorization": "Bearer " + GROQ_API_KEY
                          },
                      )

                      with urllib.request.urlopen(req, timeout=25) as r:
                          data = json.loads(r.read().decode("utf-8", "replace"))

                      text = data["choices"][0]["message"]["content"]
                      PROVIDER_COUNTS["groq"] += 1
                      return parse_llm_json(text, rule_summary)

                  except urllib.error.HTTPError as e:
                      body = e.read().decode("utf-8", "replace")
                      PROVIDER_COUNTS["rule-based"] += 1
                      return rule_summary, f"Groq HTTP {e.code}: {body[:200]}"

                  except urllib.error.URLError as e:
                      PROVIDER_COUNTS["rule-based"] += 1
                      return rule_summary, f"Groq URLError: {e.reason}"

                  except Exception as e:
                      PROVIDER_COUNTS["rule-based"] += 1
                      return rule_summary, f"Groq {type(e).__name__}: {e}"

              if GEMINI_QUOTA_EXHAUSTED:
                  PROVIDER_COUNTS["rule-based"] += 1
                  return rule_summary, "Gemini quota exceeded. Groq fallback key is missing. Rule-based brief used."

              PROVIDER_COUNTS["rule-based"] += 1
              return rule_summary, "No LLM key configured. Rule-based brief used."

          items = []

          try:
              ids = fetch_json("https://hacker-news.firebaseio.com/v0/topstories.json")[:25]

              for sid in ids[:10]:
                  try:
                      item = fetch_json(f"https://hacker-news.firebaseio.com/v0/item/{sid}.json")
                      title = item.get("title") or ""
                      url = item.get("url") or f"https://news.ycombinator.com/item?id={sid}"
                      content = title

                      if re.search(r"ai|agent|llm|gemini|openai|rag|github|model", title, re.I):
                          items.append({
                              "source": "hackernews",
                              "title": title,
                              "content": content,
                              "url": url,
                          })
                  except Exception:
                      pass
          except Exception:
              pass

          try:
              q = urllib.parse.quote("AI agents language:Python")
              repos = fetch_json(
                  f"https://api.github.com/search/repositories?q={q}&sort=stars&order=desc&per_page=10"
              )

              for repo in repos.get("items", [])[:8]:
                  items.append({
                      "source": "github",
                      "title": repo.get("full_name") or repo.get("name") or "GitHub repository",
                      "content": repo.get("description") or "No description.",
                      "url": repo.get("html_url") or "https://github.com",
                  })
          except Exception:
              pass

          try:
              q = urllib.parse.quote('all:"AI agents" OR all:"large language model"')
              xml = fetch_text(
                  f"https://export.arxiv.org/api/query?search_query={q}&start=0&max_results=8&sortBy=submittedDate&sortOrder=descending"
              )

              root = ET.fromstring(xml)
              ns = {"a": "http://www.w3.org/2005/Atom"}

              for entry in root.findall("a:entry", ns):
                  title = " ".join((entry.findtext("a:title", default="", namespaces=ns) or "").split())
                  summary = " ".join((entry.findtext("a:summary", default="", namespaces=ns) or "").split())
                  link = entry.findtext("a:id", default="https://arxiv.org", namespaces=ns)

                  items.append({
                      "source": "arxiv",
                      "title": title,
                      "content": summary,
                      "url": link,
                  })
          except Exception:
              pass

          if not items:
              items = [
                  {
                      "source": "fallback",
                      "title": "AibriefAI pipeline is live",
                      "content": "The scheduled GitHub Actions pipeline generated a fallback briefing because upstream sources were unavailable.",
                      "url": "https://github.com",
                  }
              ]

          seen = set()
          signals = []

          for raw in items:
              key = (raw["source"], raw["title"].lower().strip())

              if key in seen:
                  continue

              seen.add(key)

              score = score_text(raw["title"], raw["content"], raw["source"])
              en, ar = llm_brief(raw["title"], raw["content"])

              signals.append({
                  "id": f"{raw['source']}-{len(signals)+1:03d}",
                  "source": raw["source"],
                  "title": raw["title"],
                  "content": raw["content"],
                  "url": raw["url"],
                  "score": score,
                  "status": "verified" if score >= 40 else "held",
                  "topic": topic_for(raw["title"], raw["content"]),
                  "brief_en": en,
                  "brief_ar": ar,
                  "createdAt": NOW,
                  "updatedAt": NOW,
              })

          signals = sorted(signals, key=lambda x: x["score"], reverse=True)[:12]
          approved = sum(1 for s in signals if s["status"] == "verified")
          held = len(signals) - approved

          if PROVIDER_COUNTS["groq"] > 0:
              run_mode = "groq"
              run_model = GROQ_MODEL
          elif PROVIDER_COUNTS["gemini"] > 0:
              run_mode = "gemini"
              run_model = GEMINI_MODEL
          else:
              run_mode = "rule-based"
              run_model = None

          feed = {
              "project": "AibriefAI — إحاطة AI",
              "generated_at": NOW,
              "topic": TOPIC,
              "mode": run_mode,
              "model": run_model,
              "provider_counts": PROVIDER_COUNTS,
              "signals": signals,
          }

          report = {
              "project": "AibriefAI",
              "generated_at": NOW,
              "signals": len(signals),
              "approved": approved,
              "held": held,
              "errors": 0,
              "mode": run_mode,
              "model": run_model,
              "provider_counts": PROVIDER_COUNTS,
          }

          health = {
              "status": "ok",
              "generated_at": NOW,
              "signals": len(signals),
              "approved": approved,
              "mode": run_mode,
              "model": run_model,
              "provider_counts": PROVIDER_COUNTS,
          }

          Path("web/data/signals.json").write_text(
              json.dumps(feed, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          Path("data/latest_report.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          Path("web/health.json").write_text(
              json.dumps(health, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          Path("web/health/index.html").write_text(
              json.dumps(health, ensure_ascii=False),
              encoding="utf-8"
          )

          html = f"""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>AibriefAI — إحاطة AI</title>
            <style>
              :root {{
                color-scheme: dark;
                --bg: #050505;
                --panel: #0d0d0d;
                --border: #262626;
                --text: #f5f5f5;
                --muted: #a3a3a3;
                --indigo: #4f46e5;
              }}

              * {{
                box-sizing: border-box;
              }}

              body {{
                margin: 0;
                font-family: Inter, Arial, sans-serif;
                background:
                  radial-gradient(circle at top left, rgba(79, 70, 229, 0.16), transparent 34rem),
                  radial-gradient(circle at top right, rgba(16, 185, 129, 0.10), transparent 30rem),
                  var(--bg);
                color: var(--text);
              }}

              main {{
                max-width: 1180px;
                margin: 0 auto;
                padding: 56px 20px 80px;
              }}

              .hero {{
                border: 1px solid var(--border);
                border-radius: 30px;
                padding: 44px;
                background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015));
                box-shadow: 0 30px 90px rgba(0,0,0,0.45);
              }}

              .meta {{
                color: var(--muted);
                font-size: 13px;
                text-transform: uppercase;
                letter-spacing: .08em;
              }}

              h1 {{
                font-size: clamp(42px, 8vw, 92px);
                line-height: .9;
                margin: 18px 0;
                letter-spacing: -0.07em;
              }}

              .sub {{
                color: #d4d4d4;
                font-size: 18px;
                max-width: 760px;
                line-height: 1.6;
              }}

              .toolbar {{
                display: grid;
                grid-template-columns: 1fr auto auto;
                gap: 14px;
                margin-top: 26px;
              }}

              input,
              select,
              button {{
                border: 1px solid var(--border);
                background: rgba(255,255,255,0.045);
                color: var(--text);
                border-radius: 14px;
                padding: 12px 14px;
                font-size: 14px;
              }}

              input {{
                width: 100%;
              }}

              button {{
                cursor: pointer;
              }}

              button:hover {{
                background: rgba(255,255,255,0.09);
              }}

              .source-tabs,
              .topic-pills {{
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 16px;
              }}

              .tab.active,
              .pill.active {{
                background: var(--indigo);
                border-color: var(--indigo);
                color: #fff;
              }}

              .status-row {{
                display: flex;
                justify-content: space-between;
                gap: 14px;
                align-items: center;
                color: var(--muted);
                margin: 22px 2px 0;
                flex-wrap: wrap;
              }}

              .grid {{
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
                gap: 18px;
                margin-top: 22px;
              }}

              .card {{
                border: 1px solid var(--border);
                border-radius: 24px;
                padding: 22px;
                background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025));
                min-height: 310px;
                display: flex;
                flex-direction: column;
                gap: 12px;
              }}

              .card h2 {{
                font-size: 20px;
                line-height: 1.2;
                margin: 0;
                letter-spacing: -0.03em;
              }}

              .card p {{
                color: #d0d0d0;
                line-height: 1.65;
                margin: 0;
              }}

              .card-footer {{
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 10px;
                margin-top: auto;
              }}

              .badge {{
                display: inline-flex;
                align-items: center;
                border-radius: 999px;
                padding: 6px 10px;
                font-size: 12px;
                font-weight: 700;
                color: #050505;
              }}

              .copy {{
                padding: 8px 10px;
                border-radius: 999px;
                font-size: 12px;
              }}

              a {{
                color: #fff;
                text-decoration-color: rgba(255,255,255,0.35);
              }}

              .empty {{
                border: 1px dashed var(--border);
                border-radius: 22px;
                padding: 32px;
                color: var(--muted);
                grid-column: 1 / -1;
                text-align: center;
              }}

              @media (max-width: 760px) {{
                .hero {{
                  padding: 28px;
                }}

                .toolbar {{
                  grid-template-columns: 1fr;
                }}

                .status-row {{
                  align-items: flex-start;
                  flex-direction: column;
                }}
              }}
            </style>
          </head>
          <body>
            <main>
              <section class="hero">
                <div class="meta">Generated {escape(NOW)} · Mode: {escape(run_mode)} · Model: {escape(str(run_model))}</div>
                <h1>AibriefAI<br><span dir="rtl" lang="ar">إحاطة AI</span></h1>
                <p class="sub">Arabic/English AI briefing dashboard generated by GitHub Actions using free data sources and Gemini/Groq fallback.</p>

                <div class="toolbar">
                  <input id="search" type="search" placeholder="Search signals, topics, briefs..." autocomplete="off">
                  <select id="sort">
                    <option value="score">Score ↓</option>
                    <option value="latest">Latest</option>
                    <option value="source">Source</option>
                  </select>
                  <button id="lang" type="button">EN</button>
                </div>

                <div class="source-tabs" id="sourceTabs">
                  <button class="tab active" type="button" data-source="all">All</button>
                  <button class="tab" type="button" data-source="hackernews">HN</button>
                  <button class="tab" type="button" data-source="github">GitHub</button>
                  <button class="tab" type="button" data-source="arxiv">arXiv</button>
                  <button class="tab" type="button" data-source="reddit">Reddit</button>
                </div>

                <div class="topic-pills" id="topicPills"></div>
              </section>

              <div class="status-row">
                <div id="count">0 results found</div>
                <div id="countdown">Next update in 5:00</div>
              </div>

              <section class="grid" id="grid"></section>
            </main>

            <script>
              const SIGNALS = {json.dumps(signals, ensure_ascii=False)};

              const state = {{
                search: '',
                source: 'all',
                topics: [],
                sort: 'score',
                lang: 'en'
              }};

              function escapeHTML(value) {{
                return String(value || '')
                  .replace(/&/g, '&amp;')
                  .replace(/</g, '&lt;')
                  .replace(/>/g, '&gt;')
                  .replace(/"/g, '&quot;')
                  .replace(/'/g, '&#039;');
              }}

              function badgeColor(score) {{
                if (score >= 70) {{
                  return '#10b981';
                }}

                if (score >= 40) {{
                  return '#f59e0b';
                }}

                return '#ef4444';
              }}

              function sourceLabel(source) {{
                const labels = {{
                  hackernews: 'HN',
                  github: 'GitHub',
                  arxiv: 'arXiv',
                  reddit: 'Reddit',
                  fallback: 'Fallback'
                }};

                return labels[source] || source;
              }}

              function cardHTML(s) {{
                const text = state.lang === 'ar' ? (s.brief_ar || s.brief_en || s.content || '') : (s.brief_en || s.content || '');
                const dir = state.lang === 'ar' ? 'rtl' : 'ltr';
                const lang = state.lang === 'ar' ? 'ar' : 'en';
                const color = badgeColor(Number(s.score || 0));

                return '' +
                  '<article class="card" dir="' + dir + '" lang="' + lang + '">' +
                    '<div class="meta">' + escapeHTML(sourceLabel(s.source)) + ' · ' + escapeHTML(s.topic) + '</div>' +
                    '<h2>' + escapeHTML(s.title) + '</h2>' +
                    '<p>' + escapeHTML(text) + '</p>' +
                    '<div class="card-footer">' +
                      '<span class="badge" style="background:' + color + '">Score ' + escapeHTML(s.score) + '</span>' +
                      '<button class="copy" type="button" data-url="' + escapeHTML(s.url) + '">Copy URL</button>' +
                    '</div>' +
                    '<a href="' + escapeHTML(s.url) + '" target="_blank" rel="noopener">Open source</a>' +
                  '</article>';
              }}

              function renderTopics() {{
                const topics = Array.from(new Set(SIGNALS.map(function(s) {{
                  return s.topic || 'AI';
                }}))).sort();

                document.getElementById('topicPills').innerHTML = topics.map(function(topic) {{
                  const active = state.topics.includes(topic) ? ' active' : '';
                  return '<button class="pill' + active + '" type="button" data-topic="' + escapeHTML(topic) + '">' + escapeHTML(topic) + '</button>';
                }}).join('');
              }}

              function renderTabs() {{
                document.querySelectorAll('.tab').forEach(function(btn) {{
                  if (btn.getAttribute('data-source') === state.source) {{
                    btn.classList.add('active');
                  }} else {{
                    btn.classList.remove('active');
                  }}
                }});
              }}

              function render() {{
                let filtered = SIGNALS.slice();

                if (state.search) {{
                  const q = state.search.toLowerCase();
                  filtered = filtered.filter(function(s) {{
                    return (
                      String(s.title || '') +
                      ' ' +
                      String(s.brief_en || '') +
                      ' ' +
                      String(s.brief_ar || '') +
                      ' ' +
                      String(s.topic || '') +
                      ' ' +
                      String(s.source || '')
                    ).toLowerCase().includes(q);
                  }});
                }}

                if (state.source !== 'all') {{
                  filtered = filtered.filter(function(s) {{
                    return s.source === state.source;
                  }});
                }}

                if (state.topics.length) {{
                  filtered = filtered.filter(function(s) {{
                    return state.topics.includes(s.topic);
                  }});
                }}

                if (state.sort === 'score') {{
                  filtered.sort(function(a, b) {{
                    return Number(b.score || 0) - Number(a.score || 0);
                  }});
                }}

                if (state.sort === 'latest') {{
                  filtered.sort(function(a, b) {{
                    return String(b.updatedAt || b.createdAt || '').localeCompare(String(a.updatedAt || a.createdAt || ''));
                  }});
                }}

                if (state.sort === 'source') {{
                  filtered.sort(function(a, b) {{
                    return String(a.source || '').localeCompare(String(b.source || ''));
                  }});
                }}

                document.getElementById('grid').innerHTML =
                  filtered.length ?
                  filtered.map(cardHTML).join('') :
                  '<p class="empty">No signals match</p>';

                document.getElementById('count').textContent = filtered.length + ' results found';

                renderTabs();
                renderTopics();
              }}

              function copyToClipboard(text, button) {{
                if (navigator.clipboard && navigator.clipboard.writeText) {{
                  navigator.clipboard.writeText(text).then(function() {{
                    button.textContent = 'Copied!';
                    setTimeout(function() {{
                      button.textContent = 'Copy URL';
                    }}, 2000);
                  }}).catch(function() {{
                    fallbackCopy(text, button);
                  }});
                }} else {{
                  fallbackCopy(text, button);
                }}
              }}

              function fallbackCopy(text, button) {{
                const input = document.createElement('input');
                input.value = text;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);

                button.textContent = 'Copied!';

                setTimeout(function() {{
                  button.textContent = 'Copy URL';
                }}, 2000);
              }}

              function startCountdown() {{
                let remaining = 5 * 60;

                setInterval(function() {{
                  const minutes = Math.floor(remaining / 60);
                  const seconds = remaining % 60;

                  document.getElementById('countdown').textContent =
                    'Next update in ' + minutes + ':' + String(seconds).padStart(2, '0');

                  remaining -= 1;

                  if (remaining < 0) {{
                    remaining = 5 * 60;
                  }}
                }}, 1000);
              }}

              document.getElementById('search').addEventListener('keyup', function() {{
                state.search = this.value;
                render();
              }});

              document.getElementById('sort').addEventListener('change', function() {{
                state.sort = this.value;
                render();
              }});

              document.getElementById('lang').addEventListener('click', function() {{
                state.lang = state.lang === 'en' ? 'ar' : 'en';
                this.textContent = state.lang.toUpperCase();
                render();
              }});

              document.getElementById('sourceTabs').addEventListener('click', function(event) {{
                const btn = event.target.closest('button[data-source]');

                if (!btn) {{
                  return;
                }}

                state.source = btn.getAttribute('data-source');
                render();
              }});

              document.getElementById('topicPills').addEventListener('click', function(event) {{
                const btn = event.target.closest('button[data-topic]');

                if (!btn) {{
                  return;
                }}

                const topic = btn.getAttribute('data-topic');

                if (state.topics.includes(topic)) {{
                  state.topics = state.topics.filter(function(t) {{
                    return t !== topic;
                  }});
                }} else {{
                  state.topics.push(topic);
                }}

                render();
              }});

              document.getElementById('grid').addEventListener('click', function(event) {{
                const btn = event.target.closest('button.copy');

                if (!btn) {{
                  return;
                }}

                copyToClipboard(btn.getAttribute('data-url'), btn);
              }});

              renderTopics();
              render();
              startCountdown();
            </script>
          </body>
          </html>"""

          Path("web/index.html").write_text(html, encoding="utf-8")
          Path("web/brief.html").write_text(html, encoding="utf-8")
          PY

          python3 -m json.tool web/data/signals.json >/dev/null
