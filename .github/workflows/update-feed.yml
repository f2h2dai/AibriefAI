name: Update Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      GROQ_MODEL: llama-3.3-70b-versatile
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      PIPELINE_INTERVAL_MINUTES: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test
        run: |
          python -m compileall aibrief scripts
          pytest -q

      - name: Run pipeline
        run: |
          python scripts/run_pipeline.py --topic "AI agents" --limit 8 --emit-html

      - name: Commit updated feed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add web/data/signals.json web/brief.html web/health.json data/latest_report.json
          git commit -m "chore: update AI briefing feed" || echo "No changes"
          git push
