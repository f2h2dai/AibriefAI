name: Update Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: aibrief-feed
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: gemini-2.0-flash
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  GROQ_MODEL: llama-3.3-70b-versatile
  TWITTER_COOKIE: ${{ secrets.TWITTER_COOKIE }}
  X_INFLUENCERS: ${{ vars.X_INFLUENCERS }}

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Agent-Reach and X routes
        shell: bash
        run: |
          set +e
          export PATH="$HOME/.local/bin:$PATH"
          python3 -m pip install "git+https://github.com/Panniantong/Agent-Reach.git" || echo "Agent-Reach GitHub install unavailable; continuing with base connectors"
          if command -v pipx >/dev/null 2>&1; then
            pipx install twitter-cli || python3 -m pip install twitter-cli || echo "twitter-cli install unavailable; X route will degrade"
          else
            python3 -m pip install twitter-cli || echo "twitter-cli install unavailable; X route will degrade"
          fi
          which twitter || echo "twitter CLI unavailable after install attempt"
          agent-reach doctor || true
          set -e

      - name: Generate AibriefAI command center
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p web/data web/health data

          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import urllib.error
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          from html import escape
          from pathlib import Path

          NOW = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          TOPIC = "AI agents"

          GEMINI_API_KEY = os.getenv("GEMINI_API_KEY", "").strip()
          GEMINI_MODEL = os.getenv("GEMINI_MODEL", "gemini-2.0-flash").strip()
          GROQ_API_KEY = os.getenv("GROQ_API_KEY", "").strip()
          GROQ_MODEL = os.getenv("GROQ_MODEL", "llama-3.3-70b-versatile").strip()

          GEMINI_QUOTA_EXHAUSTED = False
          PROVIDER_COUNTS = {
              "gemini": 0,
              "groq": 0,
              "rule-based": 0
          }
          PIPELINE_EVENTS = []

          def log_event(level, agent, message):
              PIPELINE_EVENTS.append({
                  "time": NOW,
                  "level": level,
                  "agent": agent,
                  "message": str(message)[:300]
              })

          def fetch_json(url, timeout=12):
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "AibriefAI/1.0",
                      "Accept": "application/json",
                  },
              )
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return json.loads(r.read().decode("utf-8", "replace"))

          def fetch_text(url, timeout=12):
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "AibriefAI/1.0",
                      "Accept": "application/xml,text/xml,text/plain",
                  },
              )
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return r.read(2_000_000).decode("utf-8", "replace")

          X_QUERY = "AI OR agents OR LLM OR GPT OR reasoning"

          raw_cookie = os.getenv(
              "TWITTER_COOKIE", ""
          ).strip()

          auth_token = ""
          ct0 = ""

          if raw_cookie:
              for part in raw_cookie.split(";"):
                  part = part.strip()
                  if part.startswith("auth_token="):
                      auth_token = part[len("auth_token="):]
                  elif part.startswith("ct0="):
                      ct0 = part[len("ct0="):]

          if auth_token:
              os.environ["TWITTER_AUTH_TOKEN"] = auth_token
              log_event("INFO", "twitter",
                  "auth_token parsed OK")
          else:
              log_event("WARN", "twitter",
                  "auth_token missing from TWITTER_COOKIE")

          if ct0:
              os.environ["TWITTER_CT0"] = ct0
              log_event("INFO", "twitter", "ct0 parsed OK")
          else:
              log_event("WARN", "twitter",
                  "ct0 missing from TWITTER_COOKIE")

          def safe_log_text(value, limit=260):
              text = re.sub(r"\s+", " ", str(value or "")).strip()
              cookie = os.getenv("TWITTER_COOKIE", "").strip()
              if cookie:
                  text = text.replace(cookie, "[redacted-twitter-cookie]")
              return text[:limit] + ("..." if len(text) > limit else "")

          def display_command(command):
              parts = []
              for part in command:
                  text = str(part)
                  if re.search(r"\s", text):
                      parts.append('"' + text.replace('"', '\\"') + '"')
                  else:
                      parts.append(text)
              return " ".join(parts)

          def run_cli(command, timeout=45):
              try:
                  completed = subprocess.run(
                      command,
                      capture_output=True,
                      check=False,
                      env=os.environ.copy(),
                      text=True,
                      timeout=timeout,
                  )
                  return {
                      "returncode": completed.returncode,
                      "stdout": completed.stdout or "",
                      "stderr": completed.stderr or "",
                  }
              except FileNotFoundError as e:
                  return {"returncode": 127, "stdout": "", "stderr": str(e)}
              except subprocess.TimeoutExpired as e:
                  return {
                      "returncode": 124,
                      "stdout": e.stdout or "",
                      "stderr": (e.stderr or "") + f" timed out after {timeout}s",
                  }
              except Exception as e:
                  return {"returncode": 1, "stdout": "", "stderr": f"{type(e).__name__}: {e}"}

          def log_command_failure(agent, command, result):
              log_event(
                  "warning",
                  agent,
                  f"{display_command(command)} exited {result['returncode']}. stderr: {safe_log_text(result.get('stderr')) or '(empty)'}",
              )

          def log_agent_reach_doctor():
              command = ["agent-reach", "doctor"]
              result = run_cli(command, timeout=30)
              combined = f"{result.get('stdout', '')}\n{result.get('stderr', '')}"
              route_lines = [
                  safe_log_text(line, 120)
                  for line in combined.splitlines()
                  if re.search(r"twitter|x/twitter|twitter-cli|opencli|bird", line, re.I)
              ]
              route_summary = " | ".join(route_lines[:6]) or "No Twitter/X route details emitted."
              level = "info" if result["returncode"] == 0 else "warning"
              log_event(
                  level,
                  "AgentReachDoctor",
                  f"{display_command(command)} exited {result['returncode']}. Twitter/X routes: {route_summary}. stderr: {safe_log_text(result.get('stderr')) or '(empty)'}",
              )

          def x_influencer_handles():
              raw = os.getenv("X_INFLUENCERS", "")
              handles = []
              seen = set()
              for item in raw.split(","):
                  handle = re.sub(r"[^A-Za-z0-9_]", "", item.strip().removeprefix("@"))
                  key = handle.lower()
                  if handle and key not in seen:
                      seen.add(key)
                      handles.append(handle)
              return handles

          def parse_cli_json(stdout):
              text = (stdout or "").strip()
              if not text:
                  return None
              try:
                  return json.loads(text)
              except json.JSONDecodeError:
                  pass
              for line in reversed(text.splitlines()):
                  try:
                      return json.loads(line.strip())
                  except json.JSONDecodeError:
                      continue
              return None

          def extract_cli_records(payload):
              if isinstance(payload, list):
                  return payload
              if isinstance(payload, dict):
                  for key in ("results", "items", "data", "posts", "tweets"):
                      value = payload.get(key)
                      if isinstance(value, list):
                          return value
                  if any(key in payload for key in ("title", "text", "content", "url", "link")):
                      return [payload]
              return []

          def first_cli_text(*values):
              for value in values:
                  if value is None:
                      continue
                  text = " ".join(str(value).split())
                  if text:
                      return text
              return ""

          def cli_record_handle(record, fallback):
              for key in ("handle", "username", "screen_name", "author_handle"):
                  value = first_cli_text(record.get(key)).removeprefix("@")
                  if value:
                      return value
              for key in ("author", "user", "account"):
                  value = record.get(key)
                  if isinstance(value, dict):
                      handle = first_cli_text(
                          value.get("handle"),
                          value.get("username"),
                          value.get("screen_name"),
                      ).removeprefix("@")
                      if handle:
                          return handle
                  else:
                      handle = first_cli_text(value).removeprefix("@")
                      if handle:
                          return handle
              return fallback

          def normalize_cli_tweet(record, fallback_handle):
              title = first_cli_text(
                  record.get("title"),
                  record.get("headline"),
                  record.get("tweet"),
                  record.get("text"),
                  record.get("full_text"),
                  record.get("content"),
              )
              content = first_cli_text(
                  record.get("content"),
                  record.get("text"),
                  record.get("full_text"),
                  record.get("tweet"),
                  record.get("description"),
                  title,
              )
              url = first_cli_text(
                  record.get("url"),
                  record.get("link"),
                  record.get("permalink"),
                  record.get("tweet_url"),
                  record.get("post_url"),
              )
              if url.startswith("/"):
                  url = "https://x.com" + url
              handle = cli_record_handle(record, fallback_handle)
              if handle and title and not title.lower().startswith(f"@{handle.lower()}"):
                  title = f"@{handle}: {title}"
              if not title and not content:
                  return None
              return {
                  "source": "twitter",
                  "title": title or content[:90],
                  "content": content or title,
                  "url": url or "https://x.com",
                  "collector": "XInfluencerAgent",
              }

          def parse_text_tweets(stdout, handle):
              clean = re.sub(r"\x1b\[[0-9;]*m", "", stdout or "")
              blocks = re.split(r"\n\s*\n", clean)
              records = []
              for block in blocks:
                  lines = [line.strip(" \t-") for line in block.splitlines() if line.strip()]
                  if not lines:
                      continue
                  url_match = re.search(r"https?://(?:x\.com|twitter\.com)/[^\s)]+", block)
                  url = url_match.group(0) if url_match else ""
                  content_lines = [
                      line
                      for line in lines
                      if not line.lower().startswith(("warning", "error", "usage"))
                  ]
                  content = " ".join(content_lines)
                  if len(content) < 8:
                      continue
                  records.append(
                      {
                          "source": "twitter",
                          "title": f"@{handle}: {content[:90]}",
                          "content": content,
                          "url": url or "https://x.com",
                          "collector": "XInfluencerAgent",
                      }
                  )
              return records

          def parse_twitter_cli_output(stdout, handle):
              payload = parse_cli_json(stdout)
              if payload is not None:
                  records = []
                  for record in extract_cli_records(payload):
                      if isinstance(record, dict):
                          normalized = normalize_cli_tweet(record, handle)
                          if normalized:
                              records.append(normalized)
                  return records
              return parse_text_tweets(stdout, handle)

          def x_search_commands(query):
              return [
                  ["twitter", "search", query],
                  ["opencli", "twitter", "search", query],
                  ["bird", "search", query],
              ]

          def x_tweet_commands(url):
              return [
                  ["twitter", "tweet", url],
                  ["opencli", "twitter", "tweet", url],
                  ["bird", "tweet", url],
              ]

          def enrich_x_tweet(record):
              url = record.get("url", "")
              if not url.startswith(("https://x.com/", "https://twitter.com/")):
                  return record
              for command in x_tweet_commands(url):
                  result = run_cli(command, timeout=30)
                  if result["returncode"] != 0:
                      log_command_failure("XInfluencerAgent", command, result)
                      continue
                  parsed = parse_twitter_cli_output(result.get("stdout", ""), "")
                  if parsed:
                      enriched = parsed[0]
                      enriched["url"] = url
                      return enriched
              return record

          def fetch_x_influencers_cli(limit=20):
              handles = x_influencer_handles()
              if not handles:
                  log_event("critical", "XInfluencerAgent", "X_INFLUENCERS is not configured; X influencer search skipped.")
                  return []

              collected = []
              for handle in handles:
                  query = f"from:{handle} ({X_QUERY})"
                  parsed = []
                  for command in x_search_commands(query):
                      result = run_cli(command, timeout=45)
                      if result["returncode"] != 0:
                          log_command_failure("XInfluencerAgent", command, result)
                          continue
                      parsed = parse_twitter_cli_output(result.get("stdout", ""), handle)
                      if parsed:
                          log_event("info", "XInfluencerAgent", f"{display_command(command)} exited 0. Parsed {len(parsed)} X records.")
                          break
                      log_event("warning", "XInfluencerAgent", f"{display_command(command)} exited 0 but produced no parseable X records.")

                  for record in parsed:
                      if len(collected) >= limit:
                          break
                      collected.append(enrich_x_tweet(record))
                  if len(collected) >= limit:
                      break

              return collected[:limit]

          def score_text(title, content, source):
              text = f"{title} {content}".lower()

              weights = {
                  "agent": 14,
                  "agents": 14,
                  "ai": 10,
                  "llm": 10,
                  "gemini": 12,
                  "groq": 10,
                  "rag": 9,
                  "workflow": 8,
                  "automation": 8,
                  "open source": 8,
                  "github": 7,
                  "research": 7,
                  "military": 12,
                  "defense": 12,
                  "drone": 12,
                  "surveillance": 10,
                  "osint": 10,
                  "geopolitics": 9,
                  "infrastructure": 8,
              }

              score = {
                  "hackernews": 25,
                  "github": 22,
                  "arxiv": 30,
                  "reddit": 18,
                  "twitter": 28,
                  "youtube": 18,
                  "fallback": 20,
              }.get(source, 15)

              for term, weight in weights.items():
                  if re.search(rf"\b{re.escape(term)}\b", text):
                      score += weight

              return max(0, min(100, score))

          def topic_for(title, content):
              text = f"{title} {content}".lower()

              if "military" in text or "defense" in text or "drone" in text or "warfare" in text:
                  return "AI Warfare"
              if "agent" in text:
                  return "AI Agents"
              if "rag" in text or "retrieval" in text:
                  return "RAG"
              if "model" in text or "llm" in text:
                  return "LLMs"
              if "github" in text or "open source" in text:
                  return "Open Source"
              if "government" in text or "policy" in text:
                  return "AI Governance"

              return "AI"

          def score_reason(title, content, source, score):
              text = f"{title} {content}".lower()
              reasons = []

              source_labels = {
                  "github": "high-value open-source ecosystem signal",
                  "arxiv": "academic/research signal",
                  "hackernews": "live technology discussion signal",
                  "reddit": "community narrative signal",
                  "twitter": "Twitter/X discussion signal",
                  "youtube": "video/tutorial signal",
                  "fallback": "system fallback signal"
              }

              reasons.append(source_labels.get(source, "monitored AI source"))

              checks = [
                  ("agent", "agentic AI relevance"),
                  ("rag", "retrieval/RAG relevance"),
                  ("llm", "large language model relevance"),
                  ("model", "model capability relevance"),
                  ("github", "implementation ecosystem relevance"),
                  ("research", "research relevance"),
                  ("military", "strategic/security relevance"),
                  ("defense", "strategic/security relevance"),
                  ("drone", "autonomous systems relevance"),
                  ("osint", "OSINT relevance"),
                  ("surveillance", "surveillance relevance"),
                  ("infrastructure", "AI infrastructure relevance")
              ]

              for keyword, reason in checks:
                  if keyword in text and reason not in reasons:
                      reasons.append(reason)

              return "; ".join(reasons[:4]) + f". Final score: {score}."

          def summarize_rule(title, content):
              c = re.sub(r"\s+", " ", content or "").strip()

              if not c:
                  return f"{title} is relevant to AI operators tracking technical signals."

              return c[:240] + ("..." if len(c) > 240 else "")

          def summarize_rule_ar(title, content):
              en = summarize_rule(title, content)
              return "ملخص قائم على القواعد: " + en

          def parse_llm_json(text, rule_summary):
              text = text.strip()
              text = text.removeprefix("```json").removeprefix("```").removesuffix("```").strip()
              parsed = json.loads(text)

              return (
                  parsed.get("en") or rule_summary,
                  parsed.get("ar") or "لم يتم إرجاع ملخص عربي من النموذج."
              )

          def llm_brief(title, content):
              global GEMINI_QUOTA_EXHAUSTED
              global PROVIDER_COUNTS

              rule_summary = summarize_rule(title, content)
              rule_summary_ar = summarize_rule_ar(title, content)

              prompt = (
                  "Create a concise bilingual AI intelligence brief.\n"
                  "Return JSON only with keys: en, ar.\n"
                  "Style: factual, concise, OSINT-oriented, strategic, professional Arabic.\n"
                  "Do not exaggerate claims. Preserve uncertainty.\n"
                  f"Title: {title}\n"
                  f"Content: {content[:1500]}\n"
              )

              if GEMINI_API_KEY and not GEMINI_QUOTA_EXHAUSTED:
                  payload = json.dumps({
                      "contents": [{"parts": [{"text": prompt}]}],
                      "generationConfig": {
                          "temperature": 0.2,
                          "maxOutputTokens": 512
                      }
                  }).encode("utf-8")

                  url = (
                      "https://generativelanguage.googleapis.com/v1beta/models/"
                      + urllib.parse.quote(GEMINI_MODEL)
                      + ":generateContent?key="
                      + urllib.parse.quote(GEMINI_API_KEY)
                  )

                  try:
                      req = urllib.request.Request(
                          url,
                          data=payload,
                          method="POST",
                          headers={"Content-Type": "application/json"},
                      )

                      with urllib.request.urlopen(req, timeout=25) as r:
                          data = json.loads(r.read().decode("utf-8", "replace"))

                      text = data["candidates"][0]["content"]["parts"][0]["text"]
                      en, ar = parse_llm_json(text, rule_summary)
                      PROVIDER_COUNTS["gemini"] += 1
                      return en, ar, "gemini"

                  except urllib.error.HTTPError as e:
                      body = e.read().decode("utf-8", "replace")
                      err = f"Gemini HTTP {e.code}: {body[:300]}"
                      if e.code == 429:
                          GEMINI_QUOTA_EXHAUSTED = True
                      log_event("warning", "GeminiRouter", err)

                  except urllib.error.URLError as e:
                      err = f"Gemini URLError: {e.reason}"
                      log_event("warning", "GeminiRouter", err)

                  except Exception as e:
                      err = f"Gemini {type(e).__name__}: {str(e)}"
                      log_event("warning", "GeminiRouter", err)

              if GROQ_API_KEY:
                  payload = json.dumps({
                      "model": GROQ_MODEL,
                      "messages": [
                          {
                              "role": "system",
                              "content": "Return JSON only with keys en and ar."
                          },
                          {
                              "role": "user",
                              "content": prompt
                          }
                      ],
                      "temperature": 0.2,
                      "max_tokens": 512
                  }).encode("utf-8")

                  try:
                      req = urllib.request.Request(
                          "https://api.groq.com/openai/v1/chat/completions",
                          data=payload,
                          method="POST",
                          headers={
                              "Content-Type": "application/json",
                              "Authorization": "Bearer " + GROQ_API_KEY
                          },
                      )

                      with urllib.request.urlopen(req, timeout=25) as r:
                          data = json.loads(r.read().decode("utf-8", "replace"))

                      text = data["choices"][0]["message"]["content"]
                      en, ar = parse_llm_json(text, rule_summary)
                      PROVIDER_COUNTS["groq"] += 1
                      return en, ar, "groq"

                  except urllib.error.HTTPError as e:
                      body = e.read().decode("utf-8", "replace")
                      log_event("error", "GroqRouter", f"Groq HTTP {e.code}: {body[:200]}")

                  except urllib.error.URLError as e:
                      log_event("error", "GroqRouter", f"Groq URL error: {e.reason}")

                  except Exception as e:
                      log_event("error", "GroqRouter", f"Groq error: {type(e).__name__}: {e}")

              PROVIDER_COUNTS["rule-based"] += 1
              log_event("info", "RaindropTriageAgent", "Rule-based fallback used for one signal.")
              return rule_summary, rule_summary_ar, "rule-based"

          items = []

          try:
              ids = fetch_json("https://hacker-news.firebaseio.com/v0/topstories.json")[:25]

              for sid in ids[:10]:
                  try:
                      item = fetch_json(f"https://hacker-news.firebaseio.com/v0/item/{sid}.json")
                      title = item.get("title") or ""
                      url = item.get("url") or f"https://news.ycombinator.com/item?id={sid}"
                      content = title

                      if re.search(r"ai|agent|llm|gemini|openai|rag|github|model|defense|drone|osint", title, re.I):
                          items.append({
                              "source": "hackernews",
                              "title": title,
                              "content": content,
                              "url": url,
                              "collector": "NewsAgent",
                          })
                  except Exception as e:
                      log_event("warning", "NewsAgent", e)
          except Exception as e:
              log_event("error", "NewsAgent", e)

          try:
              q = urllib.parse.quote("AI agents language:Python")
              repos = fetch_json(
                  f"https://api.github.com/search/repositories?q={q}&sort=stars&order=desc&per_page=10"
              )

              for repo in repos.get("items", [])[:8]:
                  items.append({
                      "source": "github",
                      "title": repo.get("full_name") or repo.get("name") or "GitHub repository",
                      "content": repo.get("description") or "No description.",
                      "url": repo.get("html_url") or "https://github.com",
                      "collector": "GitHubAgent",
                  })
          except Exception as e:
              log_event("error", "GitHubAgent", e)

          try:
              q = urllib.parse.quote('all:"AI agents" OR all:"large language model" OR all:"autonomous systems"')
              xml = fetch_text(
                  f"https://export.arxiv.org/api/query?search_query={q}&start=0&max_results=8&sortBy=submittedDate&sortOrder=descending"
              )

              root = ET.fromstring(xml)
              ns = {"a": "http://www.w3.org/2005/Atom"}

              for entry in root.findall("a:entry", ns):
                  title = " ".join((entry.findtext("a:title", default="", namespaces=ns) or "").split())
                  summary = " ".join((entry.findtext("a:summary", default="", namespaces=ns) or "").split())
                  link = entry.findtext("a:id", default="https://arxiv.org", namespaces=ns)

                  if link.startswith("http://"):
                      link = "https://" + link[len("http://"):]

                  items.append({
                      "source": "arxiv",
                      "title": title,
                      "content": summary,
                      "url": link,
                      "collector": "AcademicAgent",
                  })
          except Exception as e:
              log_event("error", "AcademicAgent", e)

          log_agent_reach_doctor()

          try:
              x_items = fetch_x_influencers_cli(limit=20)
              items += x_items

              if x_items:
                  log_event("info", "XInfluencerAgent", f"Collected {len(x_items)} X influencer signals.")
              else:
                  log_event("critical", "XInfluencerAgent", "X influencer search returned zero items. Configure TWITTER_COOKIE and X_INFLUENCERS.")
          except Exception as e:
              log_event("critical", "XInfluencerAgent", f"X influencer search failed before collection: {type(e).__name__}: {safe_log_text(e)}")

          try:
              from aibrief.connectors.agent_reach import fetch_reddit_deep, fetch_youtube

              agent_reach_items = []
              agent_reach_items.extend(fetch_youtube() or [])
              agent_reach_items.extend(
                  fetch_reddit_deep(["LocalLLaMA", "MachineLearning", "OpenAI", "singularity"], limit=10) or []
              )

              if agent_reach_items:
                  items.extend(agent_reach_items)
              else:
                  log_event("warning", "AgentReachConnector", "Agent-Reach returned no optional social results.")
          except Exception as e:
              log_event("warning", "AgentReachConnector", f"Agent-Reach unavailable: {type(e).__name__}: {e}")

          if not items:
              items = [
                  {
                      "source": "fallback",
                      "title": "AibriefAI command pipeline is live",
                      "content": "The scheduled GitHub Actions pipeline generated a fallback briefing because upstream sources were unavailable.",
                      "url": "https://github.com",
                      "collector": "RaindropTriageAgent",
                  }
              ]

          seen = set()
          signals = []

          for raw in items:
              key = (raw["source"], raw["title"].lower().strip())

              if key in seen:
                  continue

              seen.add(key)

              score = score_text(raw["title"], raw["content"], raw["source"])
              score_note = score_reason(raw["title"], raw["content"], raw["source"], score)
              en, ar, provider = llm_brief(raw["title"], raw["content"])

              signals.append({
                  "id": f"{raw['source']}-{len(signals)+1:03d}",
                  "source": raw["source"],
                  "title": raw["title"],
                  "content": raw["content"],
                  "url": raw["url"],
                  "score": score,
                  "score_reason": score_note,
                  "status": "verified" if score >= 40 else "held",
                  "topic": topic_for(raw["title"], raw["content"]),
                  "collector": raw.get("collector", "CollectorAgent"),
                  "provider": provider,
                  "brief_en": en,
                  "brief_ar": ar,
                  "createdAt": NOW,
                  "updatedAt": NOW,
              })

          signals = sorted(signals, key=lambda x: x["score"], reverse=True)[:12]
          approved = sum(1 for s in signals if s["status"] == "verified")
          held = len(signals) - approved

          if PROVIDER_COUNTS["groq"] > 0:
              run_mode = "groq"
              run_model = GROQ_MODEL
          elif PROVIDER_COUNTS["gemini"] > 0:
              run_mode = "gemini"
              run_model = GEMINI_MODEL
          else:
              run_mode = "rule-based"
              run_model = None

          x_degraded = not any(s["source"] == "twitter" for s in signals)
          x_intel_class = "command-card degraded" if x_degraded else "command-card"
          x_intel_status = "DEGRADED" if x_degraded else "ONLINE"

          agents = [
              {"name": "NewsAgent", "status": "online", "role": "HN/news signal collection"},
              {"name": "AcademicAgent", "status": "online", "role": "arXiv research monitoring"},
              {"name": "GitHubAgent", "status": "online", "role": "open-source ecosystem tracking"},
              {"name": "XInfluencerAgent", "status": "critical" if x_degraded else "online", "role": "X/Twitter AI influencer and narrative tracking"},
              {"name": "VerificationAgent", "status": "active", "role": "confidence and source checks"},
              {"name": "VotingCommanderAgent", "status": "active", "role": "ranking and prioritization"},
              {"name": "RaindropTriageAgent", "status": "active", "role": "fallbacks and failure triage"},
              {"name": "SentinelCommanderAgent", "status": "command", "role": "provider routing and governance"},
          ]

          feed = {
              "project": "AibriefAI — إحاطة AI",
              "generated_at": NOW,
              "topic": TOPIC,
              "mode": run_mode,
              "model": run_model,
              "provider_counts": PROVIDER_COUNTS,
              "agents": agents,
              "events": PIPELINE_EVENTS[-20:],
              "signals": signals,
          }

          report = {
              "project": "AibriefAI",
              "generated_at": NOW,
              "signals": len(signals),
              "approved": approved,
              "held": held,
              "errors": len([e for e in PIPELINE_EVENTS if e["level"] == "error"]),
              "mode": run_mode,
              "model": run_model,
              "provider_counts": PROVIDER_COUNTS,
              "events": PIPELINE_EVENTS[-20:],
          }

          health = {
              "status": "ok",
              "generated_at": NOW,
              "signals": len(signals),
              "approved": approved,
              "mode": run_mode,
              "model": run_model,
              "provider_counts": PROVIDER_COUNTS,
              "agents": agents,
              "events": PIPELINE_EVENTS[-10:],
          }

          Path("web/data/signals.json").write_text(
              json.dumps(feed, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          Path("data/latest_report.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          Path("web/health.json").write_text(
              json.dumps(health, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          Path("web/health/index.html").write_text(
              json.dumps(health, ensure_ascii=False),
              encoding="utf-8"
          )

          html = f"""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>AibriefAI Command Center — إحاطة AI</title>
            <style>
              :root {{
                color-scheme: dark;
                --bg: #050505;
                --panel: #0d0d0d;
                --panel2: #111827;
                --border: #262626;
                --text: #f5f5f5;
                --muted: #a3a3a3;
                --indigo: #4f46e5;
              }}

              * {{
                box-sizing: border-box;
              }}

              body {{
                margin: 0;
                font-family: Inter, Arial, sans-serif;
                background:
                  radial-gradient(circle at top left, rgba(79, 70, 229, 0.18), transparent 34rem),
                  radial-gradient(circle at top right, rgba(16, 185, 129, 0.10), transparent 30rem),
                  var(--bg);
                color: var(--text);
              }}

              main {{
                max-width: 1240px;
                margin: 0 auto;
                padding: 42px 20px 80px;
              }}

              .hero {{
                border: 1px solid var(--border);
                border-radius: 30px;
                padding: 34px;
                background: linear-gradient(145deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
                box-shadow: 0 30px 90px rgba(0,0,0,0.45);
              }}

              .meta {{
                color: var(--muted);
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: .08em;
              }}

              h1 {{
                font-size: clamp(42px, 8vw, 86px);
                line-height: .9;
                margin: 18px 0;
                letter-spacing: -0.07em;
              }}

              .sub {{
                color: #d4d4d4;
                font-size: 18px;
                max-width: 880px;
                line-height: 1.6;
              }}

              .command-grid {{
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 12px;
                margin-top: 22px;
              }}

              .command-card {{
                border: 1px solid var(--border);
                border-radius: 18px;
                padding: 15px;
                background: rgba(255,255,255,0.045);
              }}

              .command-card.degraded {{
                border-color: #ef4444;
                background: rgba(239,68,68,0.14);
              }}

              .command-card.degraded .meta,
              .command-card.degraded strong {{
                color: #fecaca;
              }}

              .command-card strong {{
                display: block;
                margin-top: 6px;
                font-size: 17px;
              }}

              .toolbar {{
                display: grid;
                grid-template-columns: 1fr auto auto;
                gap: 14px;
                margin-top: 26px;
              }}

              .field {{
                display: flex;
                flex-direction: column;
                gap: 6px;
              }}

              .field label {{
                color: var(--muted);
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: .08em;
              }}

              input,
              select,
              button {{
                border: 1px solid var(--border);
                background: rgba(255,255,255,0.045);
                color: var(--text);
                border-radius: 14px;
                padding: 12px 14px;
                font-size: 14px;
              }}

              input {{
                width: 100%;
              }}

              button {{
                cursor: pointer;
              }}

              button:hover {{
                background: rgba(255,255,255,0.09);
              }}

              .source-tabs,
              .topic-pills {{
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 16px;
              }}

              .tab.active,
              .pill.active {{
                background: var(--indigo);
                border-color: var(--indigo);
                color: #fff;
              }}

              .tab:disabled {{
                cursor: not-allowed;
                opacity: 0.55;
              }}

              .agent-reach-note {{
                color: var(--muted);
                font-size: 13px;
                line-height: 1.5;
                margin: 12px 0 0;
              }}

              .status-row {{
                display: flex;
                justify-content: space-between;
                gap: 14px;
                align-items: center;
                color: var(--muted);
                margin: 22px 2px 0;
                flex-wrap: wrap;
              }}

              .layout {{
                display: grid;
                grid-template-columns: minmax(0, 1fr) 330px;
                gap: 18px;
                margin-top: 22px;
              }}

              .grid {{
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
                gap: 18px;
              }}

              .card,
              .side-panel {{
                border: 1px solid var(--border);
                border-radius: 24px;
                background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025));
              }}

              .card {{
                padding: 22px;
                min-height: 320px;
                display: flex;
                flex-direction: column;
                gap: 12px;
              }}

              .card h2 {{
                font-size: 20px;
                line-height: 1.2;
                margin: 0;
                letter-spacing: -0.03em;
              }}

              .card p {{
                color: #d0d0d0;
                line-height: 1.65;
                margin: 0;
              }}

              .score-reason {{
                border-left: 3px solid var(--indigo);
                padding-left: 10px;
                color: #cfcfcf;
                font-size: 13px;
                line-height: 1.5;
              }}

              .card-footer {{
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 10px;
                margin-top: auto;
              }}

              .badge {{
                display: inline-flex;
                align-items: center;
                border-radius: 999px;
                padding: 6px 10px;
                font-size: 12px;
                font-weight: 700;
                color: #050505;
              }}

              .copy {{
                padding: 8px 10px;
                border-radius: 999px;
                font-size: 12px;
              }}

              a {{
                color: #fff;
                text-decoration-color: rgba(255,255,255,0.35);
              }}

              .empty {{
                border: 1px dashed var(--border);
                border-radius: 22px;
                padding: 32px;
                color: var(--muted);
                grid-column: 1 / -1;
                text-align: center;
              }}

              .side-panel {{
                padding: 18px;
                height: fit-content;
                position: sticky;
                top: 20px;
              }}

              .agent {{
                display: flex;
                justify-content: space-between;
                gap: 12px;
                border-bottom: 1px solid var(--border);
                padding: 12px 0;
              }}

              .agent:last-child {{
                border-bottom: 0;
              }}

              .agent small {{
                color: var(--muted);
                display: block;
                margin-top: 4px;
              }}

              .status-dot {{
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: #10b981;
                margin-top: 4px;
                flex: 0 0 auto;
              }}

              @media (max-width: 900px) {{
                .layout {{
                  grid-template-columns: 1fr;
                }}

                .side-panel {{
                  position: static;
                }}
              }}

              @media (max-width: 760px) {{
                main {{
                  padding-top: 18px;
                }}

                .hero {{
                  padding: 20px;
                  border-radius: 22px;
                }}

                h1 {{
                  font-size: 42px;
                  margin: 12px 0;
                }}

                .sub {{
                  font-size: 15px;
                  line-height: 1.45;
                }}

                .command-grid {{
                  grid-template-columns: repeat(2, minmax(0, 1fr));
                  gap: 8px;
                  margin-top: 14px;
                }}

                .command-card {{
                  padding: 10px;
                  border-radius: 14px;
                }}

                .command-card strong {{
                  font-size: 14px;
                }}

                .toolbar {{
                  grid-template-columns: 1fr;
                  margin-top: 16px;
                }}

                .status-row {{
                  align-items: flex-start;
                  flex-direction: column;
                }}
              }}
            </style>
          </head>
          <body>
            <main>
              <section class="hero">
                <div class="meta">Generated {escape(NOW)} · Mode: {escape(run_mode)} · Model: {escape(str(run_model))}</div>
                <h1>AibriefAI<br><span dir="rtl" lang="ar">إحاطة AI</span></h1>
                <p class="sub">
                  Autonomous AI Intelligence Command Platform tracking AI agents, models, GitHub, arXiv, OSINT-style signals, strategic AI developments, and provider health.
                </p>

                <div class="command-grid">
                  <div class="command-card">
                    <div class="meta">COMMAND MODE</div>
                    <strong>Sentinel Commander</strong>
                  </div>
                  <div class="{escape(x_intel_class)}">
                    <div class="meta">X INTEL</div>
                    <strong>{escape(x_intel_status)}</strong>
                  </div>
                  <div class="command-card">
                    <div class="meta">TRIAGE</div>
                    <strong>Raindrop Active</strong>
                  </div>
                  <div class="command-card">
                    <div class="meta">PROVIDER</div>
                    <strong>{escape(run_mode)}</strong>
                  </div>
                  <div class="command-card">
                    <div class="meta">SIGNALS</div>
                    <strong>{len(signals)} tracked</strong>
                  </div>
                  <div class="command-card">
                    <div class="meta">VERIFIED</div>
                    <strong>{approved} approved</strong>
                  </div>
                  <div class="command-card">
                    <div class="meta">FALLBACKS</div>
                    <strong>{PROVIDER_COUNTS["rule-based"]} rule-based</strong>
                  </div>
                </div>

                <div class="toolbar">
                  <div class="field">
                    <label for="search">Search intelligence signals</label>
                    <input id="search" type="search" placeholder="Agent, RAG, arXiv, GitHub..." autocomplete="off">
                  </div>

                  <div class="field">
                    <label for="sort">Sort signals</label>
                    <select id="sort">
                      <option value="score">Score ↓</option>
                      <option value="latest">Latest</option>
                      <option value="source">Source</option>
                    </select>
                  </div>

                  <div class="field">
                    <label for="lang">Language</label>
                    <button id="lang" type="button" aria-label="Switch briefing language to Arabic">العربية</button>
                  </div>
                </div>

                <div class="source-tabs" id="sourceTabs" aria-label="Source filters">
                  <button class="tab active" type="button" data-source="all" aria-pressed="true">All</button>
                  <button class="tab" type="button" data-source="hackernews" aria-pressed="false">HN</button>
                  <button class="tab" type="button" data-source="github" aria-pressed="false">GitHub</button>
                  <button class="tab" type="button" data-source="arxiv" aria-pressed="false">arXiv</button>
                  <button class="tab" type="button" data-source="reddit" aria-pressed="false">Reddit</button>
                  <button class="tab" type="button" data-source="twitter" aria-pressed="false">Twitter/X</button>
                  <button class="tab" type="button" data-source="youtube" aria-pressed="false">YouTube</button>
                </div>
                <p class="agent-reach-note">X influencer search requires TWITTER_COOKIE and configured X_INFLUENCERS. Base connectors continue normally.</p>

                <div class="topic-pills" id="topicPills"></div>
              </section>

              <div class="status-row">
                <div id="count">0 results found</div>
                <div id="countdown">Next update in 5:00</div>
              </div>

              <div class="layout">
                <section class="grid" id="grid"></section>

                <aside class="side-panel">
                  <div class="meta">AGENT HEALTH</div>
                  <h2>Operations Center</h2>
                  <div id="agents"></div>
                </aside>
              </div>
            </main>

            <script>
              const SIGNALS = {json.dumps(signals, ensure_ascii=False)};
              const AGENTS = {json.dumps(agents, ensure_ascii=False)};

              const state = {{
                search: '',
                source: 'all',
                topics: [],
                sort: 'score',
                lang: 'en'
              }};

              function escapeHTML(value) {{
                return String(value || '')
                  .replace(/&/g, '&amp;')
                  .replace(/</g, '&lt;')
                  .replace(/>/g, '&gt;')
                  .replace(/"/g, '&quot;')
                  .replace(/'/g, '&#039;');
              }}

              function badgeColor(score) {{
                if (score >= 70) {{
                  return '#10b981';
                }}

                if (score >= 40) {{
                  return '#f59e0b';
                }}

                return '#ef4444';
              }}

              function sourceLabel(source) {{
                const labels = {{
                  hackernews: 'HN',
                  github: 'GitHub',
                  arxiv: 'arXiv',
                  reddit: 'Reddit',
                  twitter: 'Twitter/X',
                  youtube: 'YouTube',
                  fallback: 'Fallback'
                }};

                return labels[source] || source;
              }}

              const SOURCE_FILTERS = [
                ['all', 'All'],
                ['hackernews', 'HN'],
                ['github', 'GitHub'],
                ['arxiv', 'arXiv'],
                ['reddit', 'Reddit'],
                ['twitter', 'Twitter/X'],
                ['youtube', 'YouTube']
              ];

              function sourceCounts() {{
                const counts = {{}};

                SIGNALS.forEach(function(signal) {{
                  const source = signal.source || 'unknown';
                  counts[source] = (counts[source] || 0) + 1;
                }});

                counts.all = SIGNALS.length;
                return counts;
              }}

              function cardHTML(s) {{
                const text = state.lang === 'ar' ? (s.brief_ar || s.brief_en || s.content || '') : (s.brief_en || s.content || '');
                const dir = state.lang === 'ar' ? 'rtl' : 'ltr';
                const lang = state.lang === 'ar' ? 'ar' : 'en';
                const color = badgeColor(Number(s.score || 0));

                return '' +
                  '<article class="card" dir="' + dir + '" lang="' + lang + '">' +
                    '<div class="meta">' + escapeHTML(sourceLabel(s.source)) + ' · ' + escapeHTML(s.topic) + ' · ' + escapeHTML(s.provider) + '</div>' +
                    '<h2>' + escapeHTML(s.title) + '</h2>' +
                    '<p>' + escapeHTML(text) + '</p>' +
                    '<div class="score-reason"><strong>Why this matters:</strong> ' + escapeHTML(s.score_reason || 'Matched strategic AI signal criteria.') + '</div>' +
                    '<div class="card-footer">' +
                      '<span class="badge" style="background:' + color + '">Score ' + escapeHTML(s.score) + '</span>' +
                      '<button class="copy" type="button" data-url="' + escapeHTML(s.url) + '">Copy URL</button>' +
                    '</div>' +
                    '<a href="' + escapeHTML(s.url) + '" target="_blank" rel="noopener">Open source</a>' +
                  '</article>';
              }}

              function renderTopics() {{
                const topics = Array.from(new Set(SIGNALS.map(function(s) {{
                  return s.topic || 'AI';
                }}))).sort();

                document.getElementById('topicPills').innerHTML = topics.map(function(topic) {{
                  const active = state.topics.includes(topic) ? ' active' : '';
                  const pressed = state.topics.includes(topic) ? 'true' : 'false';

                  return '<button class="pill' + active + '" type="button" aria-pressed="' + pressed + '" data-topic="' + escapeHTML(topic) + '">' + escapeHTML(topic) + '</button>';
                }}).join('');
              }}

              function renderTabs() {{
                const counts = sourceCounts();

                document.getElementById('sourceTabs').innerHTML = SOURCE_FILTERS.map(function(filter) {{
                  const source = filter[0];
                  const label = filter[1];
                  const count = counts[source] || 0;
                  const active = source === state.source ? ' active' : '';
                  const pressed = source === state.source ? 'true' : 'false';
                  const disabled = source !== 'all' && count === 0 ? ' disabled aria-disabled="true"' : '';
                  const current = source === state.source ? ' aria-current="true"' : '';

                  return '<button class="tab' + active + '" type="button" data-source="' + escapeHTML(source) + '" aria-pressed="' + pressed + '"' + current + disabled + '>' + escapeHTML(label) + ' (' + count + ')</button>';
                }}).join('');
              }}

              function renderAgents() {{
                document.getElementById('agents').innerHTML = AGENTS.map(function(agent) {{
                  return '' +
                    '<div class="agent">' +
                      '<div>' +
                        '<strong>' + escapeHTML(agent.name) + '</strong>' +
                        '<small>' + escapeHTML(agent.role) + '</small>' +
                      '</div>' +
                      '<span class="status-dot" title="' + escapeHTML(agent.status) + '"></span>' +
                    '</div>';
                }}).join('');
              }}

              function render() {{
                let filtered = SIGNALS.slice();

                if (state.search) {{
                  const q = state.search.toLowerCase();
                  filtered = filtered.filter(function(s) {{
                    return (
                      String(s.title || '') +
                      ' ' +
                      String(s.brief_en || '') +
                      ' ' +
                      String(s.brief_ar || '') +
                      ' ' +
                      String(s.topic || '') +
                      ' ' +
                      String(s.source || '') +
                      ' ' +
                      String(s.provider || '')
                    ).toLowerCase().includes(q);
                  }});
                }}

                if (state.source !== 'all') {{
                  filtered = filtered.filter(function(s) {{
                    return s.source === state.source;
                  }});
                }}

                if (state.topics.length) {{
                  filtered = filtered.filter(function(s) {{
                    return state.topics.includes(s.topic);
                  }});
                }}

                if (state.sort === 'score') {{
                  filtered.sort(function(a, b) {{
                    return Number(b.score || 0) - Number(a.score || 0);
                  }});
                }}

                if (state.sort === 'latest') {{
                  filtered.sort(function(a, b) {{
                    return String(b.updatedAt || b.createdAt || '').localeCompare(String(a.updatedAt || a.createdAt || ''));
                  }});
                }}

                if (state.sort === 'source') {{
                  filtered.sort(function(a, b) {{
                    return String(a.source || '').localeCompare(String(b.source || ''));
                  }});
                }}

                document.getElementById('grid').innerHTML =
                  filtered.length ?
                  filtered.map(cardHTML).join('') :
                  '<p class="empty">No signals match</p>';

                document.getElementById('count').textContent = filtered.length + ' results found';

                renderTabs();
                renderTopics();
              }}

              function copyToClipboard(text, button) {{
                if (navigator.clipboard && navigator.clipboard.writeText) {{
                  navigator.clipboard.writeText(text).then(function() {{
                    button.textContent = 'Copied!';
                    setTimeout(function() {{
                      button.textContent = 'Copy URL';
                    }}, 2000);
                  }}).catch(function() {{
                    fallbackCopy(text, button);
                  }});
                }} else {{
                  fallbackCopy(text, button);
                }}
              }}

              function fallbackCopy(text, button) {{
                const input = document.createElement('input');
                input.value = text;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);

                button.textContent = 'Copied!';

                setTimeout(function() {{
                  button.textContent = 'Copy URL';
                }}, 2000);
              }}

              function startCountdown() {{
                let remaining = 5 * 60;

                setInterval(function() {{
                  const minutes = Math.floor(remaining / 60);
                  const seconds = remaining % 60;

                  document.getElementById('countdown').textContent =
                    'Next update in ' + minutes + ':' + String(seconds).padStart(2, '0');

                  remaining -= 1;

                  if (remaining < 0) {{
                    remaining = 5 * 60;
                  }}
                }}, 1000);
              }}

              document.getElementById('search').addEventListener('input', function() {{
                state.search = this.value;
                render();
              }});

              document.getElementById('sort').addEventListener('change', function() {{
                state.sort = this.value;
                render();
              }});

              document.getElementById('lang').addEventListener('click', function() {{
                state.lang = state.lang === 'en' ? 'ar' : 'en';

                if (state.lang === 'ar') {{
                  this.textContent = 'English';
                  this.setAttribute('aria-label', 'Switch briefing language to English');
                }} else {{
                  this.textContent = 'العربية';
                  this.setAttribute('aria-label', 'Switch briefing language to Arabic');
                }}

                render();
              }});

              document.getElementById('sourceTabs').addEventListener('click', function(event) {{
                const btn = event.target.closest('button[data-source]');

                if (!btn) {{
                  return;
                }}

                state.source = btn.getAttribute('data-source');
                render();
              }});

              document.getElementById('topicPills').addEventListener('click', function(event) {{
                const btn = event.target.closest('button[data-topic]');

                if (!btn) {{
                  return;
                }}

                const topic = btn.getAttribute('data-topic');

                if (state.topics.includes(topic)) {{
                  state.topics = state.topics.filter(function(t) {{
                    return t !== topic;
                  }});
                }} else {{
                  state.topics.push(topic);
                }}

                render();
              }});

              document.getElementById('grid').addEventListener('click', function(event) {{
                const btn = event.target.closest('button.copy');

                if (!btn) {{
                  return;
                }}

                copyToClipboard(btn.getAttribute('data-url'), btn);
              }});

              renderAgents();
              renderTopics();
              render();
              startCountdown();
            </script>
          </body>
          </html>"""

          Path("web/index.html").write_text(html, encoding="utf-8")
          Path("web/brief.html").write_text(html, encoding="utf-8")
          PY

