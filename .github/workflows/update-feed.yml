name: Update Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: aibrief-feed
  cancel-in-progress: true

env:
  ENVIRONMENT: production
  LOG_LEVEL: INFO
  PIPELINE_INTERVAL_MINUTES: "5"
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  GEMINI_MODEL: gemini-2.5-flash
  GROQ_MODEL: llama-3.3-70b-versatile
  AIBRIEF_LLM_ENABLED: "true"

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect project directory
        run: |
          if [ -f "pyproject.toml" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
          elif [ -f "AibriefAI/pyproject.toml" ]; then
            echo "PROJECT_DIR=AibriefAI" >> "$GITHUB_ENV"
          else
            echo "ERROR: pyproject.toml not found at repo root or AibriefAI/"
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

      - name: Show project files
        run: |
          echo "PROJECT_DIR=$PROJECT_DIR"
          find "$PROJECT_DIR" -maxdepth 3 -type f | sort | head -200
          test -f "$PROJECT_DIR/pyproject.toml"
          test -d "$PROJECT_DIR/aibrief"
          test -d "$PROJECT_DIR/scripts"
          test -d "$PROJECT_DIR/web"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest requests sentry-sdk

      - name: Compile Python
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python -m compileall -q aibrief scripts

      - name: Run tests
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          AIBRIEF_LLM_ENABLED: "false"
        run: |
          python -m pytest -q

      - name: Run Aibrief pipeline
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          mkdir -p data web/data web/health
          python scripts/run_pipeline.py --topic "AI agents" --limit 8 --emit-html

      - name: Verify generated output
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          test -s data/latest_report.json
          test -s web/data/signals.json
          test -s web/brief.html
          test -s web/health.json
          python -m json.tool web/data/signals.json >/dev/null
          python -m json.tool web/health.json >/dev/null

      - name: Commit updated feed
        run: |
          git config user.name "aibrief-bot"
          git config user.email "aibrief-bot@example.com"

          if [ "$PROJECT_DIR" = "." ]; then
            git add data/latest_report.json web/data/signals.json web/brief.html web/health.json web/health/index.html data/usage 2>/dev/null || true
          else
            git add AibriefAI/data/latest_report.json AibriefAI/web/data/signals.json AibriefAI/web/brief.html AibriefAI/web/health.json AibriefAI/web/health/index.html AibriefAI/data/usage 2>/dev/null || true
          fi

          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update Aibrief feed [skip ci]"
          git push
