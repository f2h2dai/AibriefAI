name: Compare X Sources

on:
  workflow_dispatch:
    inputs:
      x_influencers:
        description: "Comma-separated handles; empty uses repo variable X_INFLUENCERS or script defaults"
        required: false
        default: ""
      keywords:
        description: "Keyword expression used inside from:handle (...) queries"
        required: false
        default: "AI OR agents OR LLM OR GPT OR reasoning"
      limit:
        description: "Max normalized records per source"
        required: false
        default: "20"
      max_queries:
        description: "Max handles/queries to compare"
        required: false
        default: "8"
      birdclaw_mode:
        description: "Birdclaw read transport mode: auto, bird, xurl, or local"
        required: false
        default: "auto"
      commit_report:
        description: "Commit the Markdown comparison report to reports/x-source-comparisons"
        required: false
        default: "true"

permissions:
  contents: write

concurrency:
  group: compare-x-sources
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  X_COMPARE_KEYWORDS: ${{ inputs.keywords }}
  X_COMPARE_LIMIT: ${{ inputs.limit }}
  X_COMPARE_MAX_QUERIES: ${{ inputs.max_queries }}
  BIRDCLAW_MODE: ${{ inputs.birdclaw_mode }}
  BIRDCLAW_MAX_PAGES: "2"
  BIRDCLAW_DISABLE_LIVE_WRITES: "1"
  BIRDCLAW_ACTIONS_TRANSPORT: local
  BIRDCLAW_BACKUP_AUTO_SYNC: "0"

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node for Birdclaw
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "26.x"

      - name: Install shadow comparison tools
        shell: bash
        run: |
          set +e
          node --version
          npm --version
          python3 -m pip install "git+https://github.com/Panniantong/Agent-Reach.git" || echo "Agent-Reach install unavailable; continuing"
          python3 -m pip install twitter-cli || echo "twitter-cli install unavailable; continuing"
          npm install -g birdclaw@0.8.5 || echo "birdclaw install unavailable; comparison will report auth/tool gap"
          npm install -g @steipete/bird || echo "bird install unavailable; Birdclaw can still use xurl/local if configured"
          npm install -g @xdevplatform/xurl || echo "xurl install unavailable; Birdclaw can still use bird/local if configured"
          command -v birdclaw && birdclaw --version || true
          command -v twitter || true
          command -v agent-reach || true
          command -v xurl || true
          command -v bird || true
          set -e

      - name: Run X source shadow comparison
        shell: bash
        env:
          TWITTER_COOKIE: ${{ secrets.TWITTER_COOKIE }}
          X_INFLUENCERS: ${{ inputs.x_influencers || vars.X_INFLUENCERS }}
          X_COMPARE_INFLUENCERS: ${{ inputs.x_influencers || vars.X_INFLUENCERS }}
          OPENAI_API_KEY: ""
          X_COMPARE_RAW_DIR: ${{ runner.temp }}/x-source-comparison
        run: |
          set -euo pipefail
          python3 tools/compare_x_sources.py \
            --handles "$X_COMPARE_INFLUENCERS" \
            --keywords "$X_COMPARE_KEYWORDS" \
            --limit "$X_COMPARE_LIMIT" \
            --max-queries "$X_COMPARE_MAX_QUERIES" \
            --birdclaw-mode "$BIRDCLAW_MODE" \
            --raw-dir "$X_COMPARE_RAW_DIR"

      - name: Commit comparison report
        if: ${{ inputs.commit_report == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if ! ls reports/x-source-comparisons/*-x-source-comparison.md >/dev/null 2>&1; then
            echo "No comparison report generated; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/x-source-comparisons/*-x-source-comparison.md
          if git diff --cached --quiet; then
            echo "No comparison report changes to commit."
            exit 0
          fi
          git commit -m "Add X source comparison report [skip ci]"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
