from __future__ import annotations

import json
import logging
import os
import time
from contextlib import contextmanager
from datetime import datetime, timezone
from pathlib import Path
from typing import Any, Iterator

from aibrief.utils.io import append_jsonl
from aibrief.utils.validation import validate_output_path

LOGGER = logging.getLogger(__name__)
_SENTRY_READY = False


def init_sentry(environment: str = "production") -> bool:
    """Initialize Sentry when SENTRY_DSN is configured.

    The dependency is optional for local development. Production installs include
    sentry-sdk via pyproject dependencies.
    """
    global _SENTRY_READY
    dsn = os.getenv("SENTRY_DSN", "").strip()
    if not dsn:
        return False
    try:
        import sentry_sdk  # type: ignore

        sentry_sdk.init(
            dsn=dsn,
            environment=environment,
            release=os.getenv("AIBRIEF_RELEASE", "aibrief@local"),
            traces_sample_rate=float(os.getenv("SENTRY_TRACES_SAMPLE_RATE", "0.10")),
            profiles_sample_rate=float(os.getenv("SENTRY_PROFILES_SAMPLE_RATE", "0.0")),
            send_default_pii=False,
            enable_logs=True,
        )
        _SENTRY_READY = True
        return True
    except Exception as exc:  # pragma: no cover - defensive no-op
        LOGGER.warning("sentry_init_failed: %s", exc)
        return False


def capture_exception(exc: BaseException, *, agent: str | None = None, extra: dict[str, Any] | None = None) -> None:
    LOGGER.exception("captured_exception agent=%s", agent or "unknown", exc_info=exc)
    if not _SENTRY_READY:
        return
    try:
        import sentry_sdk  # type: ignore

        with sentry_sdk.configure_scope() as scope:
            if agent:
                scope.set_tag("agent", agent)
            if extra:
                for key, value in extra.items():
                    scope.set_extra(str(key), value)
        sentry_sdk.capture_exception(exc)
    except Exception:  # pragma: no cover
        LOGGER.debug("sentry_capture_exception_failed", exc_info=True)


def capture_message(message: str, *, level: str = "warning", agent: str | None = None, extra: dict[str, Any] | None = None) -> None:
    LOGGER.warning("captured_message agent=%s message=%s extra=%s", agent or "unknown", message, extra or {})
    if not _SENTRY_READY:
        return
    try:
        import sentry_sdk  # type: ignore

        with sentry_sdk.configure_scope() as scope:
            if agent:
                scope.set_tag("agent", agent)
            if extra:
                for key, value in extra.items():
                    scope.set_extra(str(key), value)
        sentry_sdk.capture_message(message, level=level)
    except Exception:  # pragma: no cover
        LOGGER.debug("sentry_capture_message_failed", exc_info=True)


@contextmanager
def track_agent(agent: str, slow_seconds: float = 30.0) -> Iterator[None]:
    started = time.monotonic()
    try:
        yield
    except Exception as exc:
        capture_exception(exc, agent=agent)
        raise
    finally:
        duration = time.monotonic() - started
        if duration > slow_seconds:
            capture_message(
                "slow_agent_run",
                level="warning",
                agent=agent,
                extra={"duration_seconds": round(duration, 3), "threshold_seconds": slow_seconds},
            )



def log_llm_usage(
    *,
    provider: str,
    agent: str,
    model: str,
    input_tokens: int,
    output_tokens: int,
    estimated_cost_usd: float = 0.0,
    run_id: str | None = None,
    usage_dir: str | None = None,
) -> dict[str, Any]:
    """Write per-agent LLM usage without assuming paid billing.

    Gemini and Groq are configured as free-tier providers for this deployment,
    so estimated_cost_usd defaults to 0.0. The field is retained for future
    auditability without enabling paid services.
    """
    now = datetime.now(timezone.utc)
    record = {
        "ts": now.isoformat(),
        "run_id": run_id or "",
        "provider": provider,
        "agent": agent,
        "model": model,
        "input_tokens": int(input_tokens),
        "output_tokens": int(output_tokens),
        "estimated_cost_usd": float(estimated_cost_usd),
    }
    target_dir = validate_output_path(usage_dir or os.getenv("AIBRIEF_USAGE_LOG_DIR", "data/usage"))
    target_dir.mkdir(parents=True, exist_ok=True)
    append_jsonl(target_dir / f"llm_usage_{now.date().isoformat()}.jsonl", record)
    return record
